<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Jogo da Reciclagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-sky-top: #fff7d6;
    --bg-sky-bot: #ffe2a8;
    --grass-top: #7ec850;
    --grass-bot: #4ea537;
    --ink: #2b2118;
    --ink-soft: #5a4838;
    --paper: #fff8e7;
    --azul: #2b6cb0;
    --azul-d: #1f4e85;
    --vermelho: #d23636;
    --vermelho-d: #962222;
    --verde: #2f8f3f;
    --verde-d: #1f6428;
    --amarelo: #f0b315;
    --amarelo-d: #b8830a;
    --marrom: #6a4326;
    --marrom-d: #4a2d18;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Fredoka', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 50% 120%, #ffd166 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-sky-top) 0%, var(--bg-sky-bot) 60%, #ffd178 100%);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== HUD ===== */
  .hud {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    align-items: center;
    z-index: 10;
    font-family: 'Nunito', sans-serif;
  }
  .chip {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    padding: 10px 20px;
    font-weight: 800;
    font-size: 18px;
    box-shadow: 0 4px 0 var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chip .icon { font-size: 22px; }
  .chip.score { background: #fff3a0; }
  .chip.credits { background: #d6f5d0; }
  .chip.eco { background: #cdeede; }
  .chip.streak { background: #ffd2e8; }
  .chip.lives { background: #d2eaff; }
  .hearts { letter-spacing: 2px; font-size: 18px; }
  .hearts span.lost { filter: grayscale(1) opacity(0.35); }

  .title-card {
    position: absolute;
    top: 22px;
    left: 28px;
    z-index: 10;
    font-family: 'Nunito', sans-serif;
  }
  .title-card .kicker {
    display: inline-block;
    background: var(--verde);
    color: #fff;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.18em;
    padding: 4px 10px;
    border-radius: 6px;
    border: 2px solid var(--ink);
    transform: rotate(-3deg);
  }
  .title-card h1 {
    margin: 6px 0 0;
    font-size: 36px;
    font-weight: 900;
    color: var(--ink);
    text-shadow: 3px 3px 0 #fff;
    letter-spacing: -0.02em;
  }
  .title-card .sub {
    margin-top: 2px;
    font-size: 14px;
    color: var(--ink-soft);
    font-weight: 600;
  }

  /* ===== Stage ===== */
  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }
  .clouds {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 100px;
    opacity: 0.85;
    filter: drop-shadow(0 6px 0 rgba(0,0,0,0.04));
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }
  .cloud.c1 { width: 120px; height: 28px; top: 14%; left: 12%; }
  .cloud.c1::before { width: 50px; height: 50px; top: -22px; left: 18px; }
  .cloud.c1::after { width: 36px; height: 36px; top: -14px; left: 60px; }
  .cloud.c2 { width: 160px; height: 32px; top: 9%; right: 14%; }
  .cloud.c2::before { width: 60px; height: 60px; top: -28px; left: 24px; }
  .cloud.c2::after { width: 44px; height: 44px; top: -16px; left: 78px; }
  .cloud.c3 { width: 90px; height: 22px; top: 24%; left: 42%; }
  .cloud.c3::before { width: 38px; height: 38px; top: -16px; left: 14px; }
  .cloud.c3::after { width: 28px; height: 28px; top: -10px; left: 48px; }

  .sun {
    position: absolute;
    top: 70px;
    right: 40px;
    width: 86px;
    height: 86px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffe680, #ffba2e);
    border: 4px solid var(--ink);
    box-shadow: 0 0 0 10px rgba(255, 200, 60, 0.25), 0 0 0 22px rgba(255, 200, 60, 0.12);
  }

  /* ===== Ground ===== */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background:
      linear-gradient(180deg, var(--grass-top) 0%, var(--grass-bot) 100%);
    border-top: 6px solid var(--ink);
  }
  .ground::before {
    content: '';
    position: absolute;
    top: -22px;
    left: 0;
    right: 0;
    height: 22px;
    background:
      radial-gradient(circle at 8% 100%, var(--grass-top) 0 12px, transparent 13px),
      radial-gradient(circle at 22% 100%, var(--grass-top) 0 16px, transparent 17px),
      radial-gradient(circle at 38% 100%, var(--grass-top) 0 14px, transparent 15px),
      radial-gradient(circle at 56% 100%, var(--grass-top) 0 18px, transparent 19px),
      radial-gradient(circle at 74% 100%, var(--grass-top) 0 12px, transparent 13px),
      radial-gradient(circle at 90% 100%, var(--grass-top) 0 16px, transparent 17px);
  }
  .ground::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 12% 60%, rgba(255,255,255,0.08) 2px, transparent 3px),
      radial-gradient(circle at 28% 80%, rgba(255,255,255,0.08) 2px, transparent 3px),
      radial-gradient(circle at 46% 50%, rgba(255,255,255,0.08) 2px, transparent 3px),
      radial-gradient(circle at 64% 75%, rgba(255,255,255,0.08) 2px, transparent 3px),
      radial-gradient(circle at 82% 55%, rgba(255,255,255,0.08) 2px, transparent 3px);
  }
  .flowers {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    pointer-events: none;
    z-index: 1;
  }
  .flowers svg { display: block; margin: 0 auto; }

  /* ===== Bins row ===== */
  .bins {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(12px, 2.2vw, 36px);
    padding: 0 24px;
    z-index: 3;
  }
  .bin {
    position: relative;
    width: clamp(110px, 13vw, 170px);
    cursor: default;
    transition: transform 0.18s ease;
  }
  .bin.hover { transform: translateY(-10px) scale(1.04); }
  .bin .label {
    margin: 12px auto 0;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 12px;
    padding: 6px 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    text-align: center;
    font-size: 15px;
    box-shadow: 0 3px 0 var(--ink);
    width: fit-content;
    color: var(--ink);
  }
  .bin .label .pt {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    font-weight: 700;
    margin-top: -2px;
  }
  .bin .lid {
    transform-origin: 90% 100%;
    transition: transform 0.25s cubic-bezier(.5,1.6,.3,1);
  }
  .bin.hover .lid { transform: rotate(-32deg) translate(-4px, -2px); }
  .bin.correct { animation: bounce 0.6s ease; }
  .bin.wrong { animation: shake 0.45s ease; }

  /* ===== Basketball hoop ===== */
  .hoop {
    position: relative;
    width: 100%;
    height: 86px;
    margin-bottom: -18px;
    z-index: 2;
    pointer-events: none;
  }
  .hoop svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .hoop .net {
    transform-origin: 50% 0;
    transition: transform 0.15s ease;
  }
  .bin.correct .hoop .net { animation: netSwing 0.7s ease; }
  .bin.hover .hoop .net { transform: scaleY(1.08) skewX(-3deg); }
  @keyframes netSwing {
    0% { transform: scaleY(1) skewX(0); }
    20% { transform: scaleY(1.35) skewX(-8deg); }
    50% { transform: scaleY(1.15) skewX(6deg); }
    75% { transform: scaleY(1.08) skewX(-3deg); }
    100% { transform: scaleY(1) skewX(0); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(-22px) scale(1.06); }
    60% { transform: translateY(-4px); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px) rotate(-2deg); }
    40% { transform: translateX(10px) rotate(2deg); }
    60% { transform: translateX(-8px) rotate(-1deg); }
    80% { transform: translateX(8px) rotate(1deg); }
  }

  /* ===== Item to throw ===== */
  .item-wrap {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    touch-action: none;
  }
  .item {
    width: 110px;
    height: 110px;
    cursor: grab;
    transition: filter 0.2s;
    filter: drop-shadow(0 12px 0 rgba(0,0,0,0.12));
    animation: idle 2.4s ease-in-out infinite;
  }
  .item-wrap.dragging .item {
    cursor: grabbing;
    animation: none;
    filter: drop-shadow(0 24px 8px rgba(0,0,0,0.25));
    transform: scale(1.08) rotate(8deg);
  }
  .item-wrap.flying { transition: top 0.55s cubic-bezier(.4,.1,.4,1), left 0.55s linear; }
  .item-wrap.flying .item { animation: spinFly 0.55s linear; }
  .item-wrap.return { transition: top 0.4s ease, left 0.4s ease; }
  @keyframes spinFly {
    0%   { transform: rotate(0) scale(1); }
    100% { transform: rotate(540deg) scale(0.45); }
  }

  /* Score popup (basketball points) */
  .points-pop {
    position: absolute;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 42px;
    color: #ff8a00;
    -webkit-text-stroke: 3px var(--ink);
    text-shadow: 0 4px 0 var(--ink);
    pointer-events: none;
    z-index: 18;
    animation: pointsFly 1s ease-out forwards;
  }
  @keyframes pointsFly {
    0%   { transform: translate(-50%, 0) scale(0.4); opacity: 0; }
    25%  { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -90px) scale(1); opacity: 0; }
  }

  @keyframes idle {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }

  .hint {
    position: absolute;
    top: calc(30% + 80px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    color: var(--ink);
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    padding: 8px 18px;
    box-shadow: 0 4px 0 var(--ink);
    font-size: 16px;
    z-index: 4;
    white-space: nowrap;
  }
  .hint .arrow {
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 12px solid var(--ink);
  }
  .hint .arrow::after {
    content: '';
    position: absolute;
    top: -14px;
    left: -8px;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid #fff;
  }

  /* ===== Floating feedback ===== */
  .feedback {
    position: absolute;
    left: 50%;
    top: 38%;
    transform: translateX(-50%);
    z-index: 20;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    pointer-events: none;
  }
  .feedback .word {
    font-size: 64px;
    color: #fff;
    -webkit-text-stroke: 4px var(--ink);
    text-shadow: 0 8px 0 var(--ink);
    animation: pop 1.1s ease forwards;
  }
  .feedback .word.good { color: #fff; }
  .feedback .word.bad  { color: #ffd2d2; }
  .feedback .sub {
    margin-top: 8px;
    font-size: 17px;
    color: var(--ink);
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 12px;
    padding: 6px 14px;
    box-shadow: 0 4px 0 var(--ink);
    animation: fadeUp 1.1s ease forwards;
    text-align: center;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  @keyframes pop {
    0%   { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    20%  { transform: scale(1.2) rotate(4deg); opacity: 1; }
    40%  { transform: scale(1) rotate(-2deg); }
    80%  { opacity: 1; transform: scale(1) translateY(-10px); }
    100% { opacity: 0; transform: scale(1) translateY(-40px); }
  }
  @keyframes fadeUp {
    0%   { transform: translateY(20px); opacity: 0; }
    20%  { transform: translateY(0); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(-30px); opacity: 0; }
  }

  /* Confetti */
  .confetti {
    position: absolute;
    width: 12px;
    height: 16px;
    pointer-events: none;
    z-index: 15;
    border-radius: 2px;
    animation: fall 1.4s ease-out forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(420px) rotate(720deg); opacity: 0; }
  }

  /* ===== Instructions / Restart ===== */
  .restart {
    position: absolute;
    top: 22px;
    right: 28px;
    z-index: 10;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 12px;
    padding: 10px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    box-shadow: 0 4px 0 var(--ink);
    cursor: pointer;
    font-size: 14px;
    color: var(--ink);
    transition: transform 0.1s;
  }
  .restart:hover { transform: translateY(-2px); }
  .restart:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--ink); }

  /* Game over modal */
  .modal {
    position: absolute;
    inset: 0;
    background: rgba(43, 33, 24, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(2px);
  }
  .modal .card {
    background: #fff;
    border: 4px solid var(--ink);
    border-radius: 24px;
    padding: 36px 44px;
    text-align: center;
    box-shadow: 0 8px 0 var(--ink);
    font-family: 'Nunito', sans-serif;
    max-width: 460px;
  }
  .modal h2 {
    margin: 0;
    font-size: 36px;
    font-weight: 900;
    color: var(--ink);
  }
  .modal .big-score {
    font-size: 64px;
    font-weight: 900;
    color: var(--verde);
    margin: 12px 0;
    line-height: 1;
  }
  .modal .stars { font-size: 30px; margin: 8px 0 16px; }
  .modal p { margin: 8px 0 20px; color: var(--ink-soft); font-weight: 600; }
  .modal button {
    background: var(--verde);
    color: #fff;
    border: 3px solid var(--ink);
    border-radius: 14px;
    padding: 14px 28px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    box-shadow: 0 5px 0 var(--ink);
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .modal button:hover { transform: translateY(-2px); }
  .modal button:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ink); }

  .modal .report {
    text-align: left;
    background: #f7f3e8;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 10px 14px;
    margin: 0 0 18px;
    font-size: 15px;
  }
  .modal .report-title { font-weight: 900; margin-bottom: 6px; text-align: center; }
  .modal .report .row { display: flex; justify-content: space-between; padding: 2px 0; }
  .modal .report .row small { color: var(--ink-soft); font-weight: 700; }

  /* ===== Destination routing panel ===== */
  .dest-panel {
    position: absolute;
    left: 50%;
    top: 44%;
    transform: translate(-50%, -50%) scale(0.9);
    z-index: 22;
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 22px;
    padding: 16px 22px 14px;
    box-shadow: 0 8px 0 var(--ink);
    font-family: 'Nunito', sans-serif;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    max-width: min(94vw, 580px);
  }
  .dest-panel.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .dest-title { font-weight: 900; font-size: 19px; color: var(--ink); margin-bottom: 14px; }
  .dest-options { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .dest-btn {
    --accent: #888;
    background: #fff;
    border: 3px solid var(--ink);
    border-bottom: 6px solid var(--accent);
    border-radius: 16px;
    padding: 12px 16px 10px;
    min-width: 104px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    color: var(--ink);
    box-shadow: 0 4px 0 var(--ink);
    transition: transform 0.1s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .dest-btn:hover { transform: translateY(-3px); }
  .dest-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--ink); }
  .dest-btn .dico { font-size: 34px; line-height: 1; }
  .dest-btn .dname { font-size: 14px; }
  .dest-legend { margin-top: 14px; font-size: 12px; font-weight: 700; color: var(--ink-soft); }
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- Decorative sky -->
  <div class="sun"></div>
  <div class="clouds">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
  </div>

  <!-- HUD -->
  <div class="title-card">
    <span class="kicker">BASQUETE DA RECICLAGEM 🏀</span>
    <h1>Joga no Lugar Certo!</h1>
    <div class="sub">Separe na cor certa e dê o destino certo ♻️</div>
  </div>

  <div class="hud">
    <div class="chip score"><span class="icon">🏀</span><span>Pontos: <b id="score">0</b></span></div>
    <div class="chip credits"><span class="icon">♻️</span><span>Créditos: <b id="credits">0</b></span></div>
    <div class="chip eco"><span class="icon">🌱</span><span>EcoPontos: <b id="eco">0</b></span></div>
    <div class="chip streak"><span class="icon">🔥</span><span>Sequência: <b id="streak">0</b></span></div>
    <div class="chip lives"><span class="icon">❤️</span><span class="hearts" id="hearts">❤️❤️❤️</span></div>
  </div>

  <button class="restart" id="restart">↻ Reiniciar</button>

  <div class="ground"></div>

  <!-- Bins -->
  <div class="bins" id="bins"></div>

  <!-- Item -->
  <div class="hint" id="hint">Arraste para a lixeira certa!<span class="arrow"></span></div>
  <div class="item-wrap" id="itemWrap">
    <div class="item" id="item"></div>
  </div>

  <!-- Destination routing (step after sorting) -->
  <div class="dest-panel" id="destPanel" aria-hidden="true">
    <div class="dest-title" id="destTitle">Pra onde vai?</div>
    <div class="dest-options" id="destOptions"></div>
    <div class="dest-legend">Melhor → pior: 🔄 Reutilizar › ♻️ Reciclar / 🌱 Compostar › 🔥 Incinerar › ⛰️ Aterro</div>
  </div>
</div>

<script>
/* ============================================================
   Data
   ============================================================ */
const BINS = [
  { id: 'azul',     name: 'Papel',     ptColor: 'AZUL',     color: 'var(--azul)',     dark: 'var(--azul-d)' },
  { id: 'vermelho', name: 'Plástico',  ptColor: 'VERMELHA', color: 'var(--vermelho)', dark: 'var(--vermelho-d)' },
  { id: 'verde',    name: 'Vidro',     ptColor: 'VERDE',    color: 'var(--verde)',    dark: 'var(--verde-d)' },
  { id: 'amarelo',  name: 'Metal',     ptColor: 'AMARELA',  color: 'var(--amarelo)',  dark: 'var(--amarelo-d)' },
  { id: 'marrom',   name: 'Orgânico',  ptColor: 'MARROM',   color: 'var(--marrom)',   dark: 'var(--marrom-d)' },
];

// Destinos, ordenados pela hierarquia do lixo (D-04): reutilizar > reciclar/compostar > incinerar > aterro.
// Créditos seguem essa ordem; EcoPontos premiam só o que é realmente "verde"
// (incinerar gera energia = poucos créditos, mas 0 EcoPonto; aterro quase nada).
const DESTINOS = {
  reutilizar: { name: 'Reutilizar', icon: '🔄', color: '#1f9d8f', credits: 5, eco: 5, tip: 'O objeto volta a ser usado inteiro — a melhor opção de todas.' },
  reciclar:   { name: 'Reciclar',   icon: '♻️', color: '#2f8f3f', credits: 4, eco: 4, tip: 'Vira matéria-prima nova. Ótimo destino.' },
  compostar:  { name: 'Compostar',  icon: '🌱', color: '#7a9a2e', credits: 4, eco: 4, tip: 'Orgânico vira adubo para a terra.' },

/* ============================================================
   Game logic
   ============================================================ */
const $stage = document.getElementById('stage');
const $bins = document.getElementById('bins');
const $item = document.getElementById('item');
const $itemWrap = document.getElementById('itemWrap');
const $hint = document.getElementById('hint');
const $score = document.getElementById('score');
const $credits = document.getElementById('credits');
const $eco = document.getElementById('eco');
const $streak = document.getElementById('streak');
const $hearts = document.getElementById('hearts');
const $restart = document.getElementById('restart');
const $destPanel = document.getElementById('destPanel');
const $destTitle = document.getElementById('destTitle');
const $destOptions = document.getElementById('destOptions');

let state = {
  score: 0,
  streak: 0,
  best: 0,
  lives: 3,
  credits: 0,
  ecoPoints: 0,
  highScore: 0,
  runCredits: 0,
  runEco: 0,
  stats: {},
  current: null,
  queue: [],
  phase: 'sorting', // 'sorting' = arrastar p/ lixeira · 'routing' = escolher destino
  dragging: false,
  startX: 0, startY: 0,
  offsetX: 0, offsetY: 0,
  itemX: 0, itemY: 0,
  hintShown: true,
};

/* ===== Save / persistência (LocalStorage) ===== */
const SAVE_KEY = 'jogo-reciclagem-save-v1';
function loadSave() {
  let data = {};
  try { data = JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch (e) {}
  state.credits   = data.credits   || 0;
  state.ecoPoints = data.ecoPoints || 0;
  state.highScore = data.highScore || 0;
  state.stats     = data.stats     || {};
}
function persist() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      credits: state.credits,
      ecoPoints: state.ecoPoints,
      highScore: state.highScore,
      stats: state.stats,
    }));
  } catch (e) {}
}
function recordResult(catId, ok) {
  if (!state.stats[catId]) state.stats[catId] = { ok: 0, err: 0 };
  state.stats[catId][ok ? 'ok' : 'err'] += 1;
}
function recordDestino(optimal) {
  if (!state.stats.__routing) state.stats.__routing = { opt: 0, sub: 0 };
  state.stats.__routing[optimal ? 'opt' : 'sub'] += 1;
}

function renderBins() {
  $bins.innerHTML = '';
  BINS.forEach(b => {
    const el = document.createElement('div');
    el.className = 'bin';
    el.dataset.id = b.id;
    el.innerHTML = `
      <div class="hoop">${hoopSVG()}</div>
      ${binSVG(b.color, b.dark)}
      <div class="label">${b.name}<span class="pt">LATA ${b.ptColor}</span></div>
    `;
    $bins.appendChild(el);
  });
}

function shuffleQueue() {
  const arr = [...ITEMS];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  state.queue = arr;
}

function nextItem() {
  if (state.queue.length === 0) shuffleQueue();
  state.phase = 'sorting';
  state.current = state.queue.shift();
  $item.innerHTML = state.current.svg;
  $itemWrap.style.opacity = '1';
  $itemWrap.style.transition = 'top 0.45s ease, left 0.45s ease';
  $itemWrap.style.top = '30%';
  $itemWrap.style.left = '50%';
  state.itemX = 0; state.itemY = 0;
  setTimeout(() => { $itemWrap.style.transition = ''; }, 460);

  // update hint
  if (state.hintShown) {
    $hint.style.display = 'block';
    $hint.childNodes[0].nodeValue = `Onde joga ${state.current.name.toLowerCase()}? `;
  }
}

function setHUD() {
  $score.textContent = state.score;
  $credits.textContent = state.credits;
  $eco.textContent = state.ecoPoints;
  $streak.textContent = state.streak;
  let hearts = '';
  for (let i = 0; i < 3; i++) {
    hearts += `<span class="${i < state.lives ? '' : 'lost'}">❤️</span>`;
  }
  $hearts.innerHTML = hearts;
}

/* ===== Drag handlers ===== */
function pointerDown(e) {
  if (!state.current || state.phase !== 'sorting') return;
  e.preventDefault();
  state.dragging = true;
  const p = pointFromEvent(e);
  const rect = $itemWrap.getBoundingClientRect();
  // store offset from center of itemWrap to pointer
  state.offsetX = p.x - (rect.left + rect.width/2);
  state.offsetY = p.y - (rect.top + rect.height/2);
  $itemWrap.classList.add('dragging');
  if (state.hintShown) {
    $hint.style.display = 'none';
    state.hintShown = false;
  }
}

function pointerMove(e) {
  if (!state.dragging) return;
  const p = pointFromEvent(e);
  const stageRect = $stage.getBoundingClientRect();
  // place wrap center under cursor (- offset)
  const x = p.x - stageRect.left - state.offsetX;
  const y = p.y - stageRect.top - state.offsetY;
  $itemWrap.style.left = x + 'px';
  $itemWrap.style.top  = y + 'px';
  $itemWrap.style.transform = 'translate(-50%, -50%)';
  // hover over bins
  highlightBinAt(p.x, p.y);
}

function pointerUp(e) {
  if (!state.dragging) return;
  state.dragging = false;
  $itemWrap.classList.remove('dragging');
  const p = pointFromEvent(e);
  const binEl = binAt(p.x, p.y);
  clearBinHover();
  if (binEl) {
    handleDrop(binEl);
  } else {
    // return item to start
    returnItem();
  }
}

function pointFromEvent(e) {
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.changedTouches && e.changedTouches.length) {
    return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function binAt(x, y) {
  return [...document.querySelectorAll('.bin')].find(b => {
    const r = b.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  });
}

function highlightBinAt(x, y) {
  const target = binAt(x, y);
  document.querySelectorAll('.bin').forEach(b => {
    b.classList.toggle('hover', b === target);
  });
}
function clearBinHover() {
  document.querySelectorAll('.bin').forEach(b => b.classList.remove('hover'));
}

function returnItem() {
  $itemWrap.classList.add('return');
  $itemWrap.style.top = '30%';
  $itemWrap.style.left = '50%';
  $itemWrap.style.transform = 'translate(-50%, -50%)';
  setTimeout(() => $itemWrap.classList.remove('return'), 450);
}

/* ===== Drop logic ===== */
function handleDrop(binEl) {
  const binId = binEl.dataset.id;
  const item = state.current;
  const isCorrect = binId === item.correct;
  const correctBin = BINS.find(b => b.id === item.correct);
  recordResult(item.correct, isCorrect);

  if (isCorrect) {
    // Arc the item into the hoop
    const stageRect = $stage.getBoundingClientRect();
    const binRect = binEl.getBoundingClientRect();
    const targetX = binRect.left + binRect.width/2 - stageRect.left;
    const targetY = binRect.top + 30 - stageRect.top; // aim at the rim
    $itemWrap.classList.add('flying');
    $itemWrap.style.left = targetX + 'px';
    $itemWrap.style.top  = targetY + 'px';

    setTimeout(() => binEl.classList.add('correct'), 450);

    const points = 10 + state.streak * 2;
    state.score += points;
    state.streak += 1;
    state.best = Math.max(state.best, state.streak);
    state.highScore = Math.max(state.highScore, state.score);
    persist();
    setHUD();

    setTimeout(() => {
      const swishWords = ['CESTA!', 'SWISH!', 'NA CESTA!', 'PERFEITO!', 'BELA CESTA!'];
      const w = swishWords[Math.floor(Math.random() * swishWords.length)];
      showFeedback(w, 'Cor certa! Agora dê o destino certo.', true);
      showPoints(binEl, '+' + points);
      confettiBurst(binEl);
    }, 480);

    // Etapa após separar: roteia para o destino (créditos seguem a hierarquia).
    setTimeout(() => {
      binEl.classList.remove('correct');
      enterRouting(item, binEl);
    }, 1200);
  } else {
    binEl.classList.add('wrong');
    state.streak = 0;
    state.lives -= 1;
    persist();
    showFeedback('OPA!', `Vai na lata ${correctBin.ptColor} (${correctBin.name}). ${item.tip}`, false, binEl);
    setHUD();
    setTimeout(() => binEl.classList.remove('wrong'), 600);
    if (state.lives <= 0) {
      setTimeout(gameOver, 1000);
    } else {
      setTimeout(() => {
        returnItem();
      }, 700);
    }
  }
}

/* ===== Destination routing (step after sorting) ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function enterRouting(item, binEl) {
  state.phase = 'routing';
  $itemWrap.classList.remove('flying');
  $itemWrap.style.opacity = '0';
  $itemWrap.style.transition = '';
  $hint.style.display = 'none';
  $destTitle.textContent = `Você separou ${item.name.toLowerCase()}. Pra onde vai agora?`;
  renderDestOptions(item, binEl);
  $destPanel.classList.add('show');
  $destPanel.setAttribute('aria-hidden', 'false');
}

function renderDestOptions(item, binEl) {
  $destOptions.innerHTML = '';
  shuffle([...item.options]).forEach(id => {
    const d = DESTINOS[id];
    const btn = document.createElement('button');
    btn.className = 'dest-btn';
    btn.style.setProperty('--accent', d.color);
    btn.innerHTML = `<span class="dico">${d.icon}</span><span class="dname">${d.name}</span>`;
    btn.addEventListener('click', () => resolveRouting(id, item, binEl));
    $destOptions.appendChild(btn);
  });
}

function resolveRouting(destId, item, binEl) {
  if (state.phase !== 'routing') return; // ignora cliques duplos
  state.phase = 'resolved';
  $destPanel.classList.remove('show');
  $destPanel.setAttribute('aria-hidden', 'true');

  const dest = DESTINOS[destId];
  const best = DESTINOS[item.destino];
  const optimal = destId === item.destino;
  const credits = dest.credits + Math.floor(state.streak / 3);
  const eco = dest.eco;

  state.credits += credits;
  state.runCredits += credits;
  state.ecoPoints += eco;
  state.runEco += eco;
  recordDestino(optimal);
  persist();
  setHUD();

  if (optimal) {
    showFeedback(dest.name.toUpperCase() + '!', `${dest.tip} +${credits} ♻️ · +${eco} 🌱`, true);
    confettiBurst(binEl);
  } else {
    showFeedback('QUASE!', `Melhor seria ${best.name.toLowerCase()} ${best.icon} — ${best.tip} Você levou só +${credits} ♻️ · +${eco} 🌱.`, false);
  }
  showPoints(binEl, '+' + credits + ' ♻️');

  setTimeout(nextItem, optimal ? 1150 : 1550);
}

function showFeedback(word, sub, good) {
  const el = document.createElement('div');
  el.className = 'feedback';
  el.innerHTML = `<div class="word ${good ? 'good' : 'bad'}">${word}</div><div class="sub">${sub}</div>`;
  $stage.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function showPoints(binEl, text) {
  const r = binEl.getBoundingClientRect();
  const stageRect = $stage.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'points-pop';
  el.textContent = text;
  el.style.left = (r.left + r.width/2 - stageRect.left) + 'px';
  el.style.top  = (r.top - 8 - stageRect.top) + 'px';
  $stage.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function confettiBurst(binEl) {
  const colors = ['#f0b315', '#2f8f3f', '#2b6cb0', '#d23636', '#e94e9b', '#fff'];
  const r = binEl.getBoundingClientRect();
  const stageRect = $stage.getBoundingClientRect();
  const cx = r.left + r.width/2 - stageRect.left;
  const cy = r.top + 20 - stageRect.top;
  for (let i = 0; i < 22; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[i % colors.length];
    c.style.left = (cx + (Math.random() - 0.5) * 60) + 'px';
    c.style.top  = (cy + (Math.random() - 0.5) * 20) + 'px';
    c.style.animationDelay = (Math.random() * 0.15) + 's';
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    $stage.appendChild(c);
    setTimeout(() => c.remove(), 1500);
  }
}

/* ===== Game over ===== */
function reportHTML() {
  const rows = BINS.map(b => {
    const s = state.stats[b.id];
    const total = s ? s.ok + s.err : 0;
    if (total === 0) return '';
    const pct = Math.round((s.ok / total) * 100);
    return `<div class="row"><span>${b.name}</span><span>${pct}% <small>(${s.ok}/${total})</small></span></div>`;
  }).filter(Boolean).join('');

  const r = state.stats.__routing;
  let routingRow = '';
  if (r && (r.opt + r.sub) > 0) {
    const tot = r.opt + r.sub;
    const pct = Math.round((r.opt / tot) * 100);
    routingRow = `<div class="row"><span>Destino ideal 🔄♻️🌱</span><span>${pct}% <small>(${r.opt}/${tot})</small></span></div>`;
  }

  if (!rows && !routingRow) return '';
  return `<div class="report"><div class="report-title">Seu aprendizado</div>${rows}${routingRow}</div>`;
}

function gameOver() {
  const modal = document.createElement('div');
  modal.className = 'modal';
  let stars = '⭐'.repeat(Math.min(3, Math.max(1, Math.floor(state.score / 30))));
  modal.innerHTML = `
    <div class="card">
      <h2>Fim de jogo!</h2>
      <div class="big-score">${state.score}</div>
      <div class="stars">${stars}</div>
      <p>Recorde: <b>${state.highScore}</b> · Melhor sequência: <b>${state.best}</b><br/>
         Créditos: <b>+${state.runCredits} ♻️</b> (total ${state.credits})<br/>
         EcoPontos: <b>+${state.runEco} 🌱</b> (total ${state.ecoPoints})</p>
      ${reportHTML()}
      <button id="playAgain">JOGAR DE NOVO</button>
    </div>`;
  $stage.appendChild(modal);
  document.getElementById('playAgain').onclick = () => {
    modal.remove();
    resetGame();
  };
}

function resetGame() {
  state.score = 0;
  state.streak = 0;
  state.lives = 3;
  state.best = 0;
  state.runCredits = 0;
  state.runEco = 0;
  state.phase = 'sorting';
  state.hintShown = true;
  $destPanel.classList.remove('show');
  $destPanel.setAttribute('aria-hidden', 'true');
  $itemWrap.style.opacity = '1';
  setHUD();
  shuffleQueue();
  nextItem();
}

/* ===== Listeners ===== */
$item.addEventListener('mousedown', pointerDown);
$item.addEventListener('touchstart', pointerDown, { passive: false });
window.addEventListener('mousemove', pointerMove);
window.addEventListener('touchmove', pointerMove, { passive: false });
window.addEventListener('mouseup', pointerUp);
window.addEventListener('touchend', pointerUp);
$restart.addEventListener('click', resetGame);

/* ===== Init ===== */
loadSave();
renderBins();
shuffleQueue();
nextItem();
setHUD();
</script>
</body>
</html>
