<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><title>Jogo da Reciclagem</title><meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/></head><body><div class="stage" id="stage"><div class="title-card"><h1>Jogo da Reciclagem</h1><div class="sub">Desafios, níveis, recompensas e checkpoint</div></div>
<div class="hud"><div class="chip">Pontos: <b id="score">0</b></div><div class="chip">Sequência: <b id="streak">0</b></div><div class="chip" id="hearts">❤️❤️❤️</div></div>
<div class="meta-hud"><div class="chip">Nível: <b id="level">1</b></div><div class="chip">XP: <b id="xp">0</b></div><div class="chip">Moedas: <b id="rewards">0</b></div><div class="chip">Checkpoint: <b id="checkpoint">0</b></div></div>
<button class="restart" id="restart">Reiniciar</button><div class="challenge-panel"><b>Desafios</b><div id="challengeList"></div></div><div class="ground"></div><div class="bins" id="bins"></div>
<div class="hint" id="hint">Arraste para a lixeira certa</div><div class="item-wrap" id="itemWrap"><div class="item" id="item"></div></div></div><script src="game.js"></script></body></html>
